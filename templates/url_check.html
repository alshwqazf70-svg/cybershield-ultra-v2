{% extends "base.html" %}
{% block title %}🔗 فحص الروابط الأسطوري - CyberShield Ultra{% endblock %}
{% block content %}

<div class="tool-container" style="max-width: 1400px; margin: 0 auto 80px; padding: 0 20px;">
    <div class="url-tool-card">
        <div class="url-tool-header">
            <h2 class="url-title-large">🔍 محلل الروابط الأسطوري</h2>
        </div>

        <!-- INPUT AREA -->
        <div class="url-input-area">
            <div class="url-input-wrapper">
                <input type="text" id="url-input" class="url-input-field"
                       placeholder="أدخل الرابط (مثال: https://google.com)" dir="ltr"
                       value="https://google.com">
            </div>
            <button id="url-analyze-btn" class="url-analyze-btn">🔍 فحص أسطوري</button>
        </div>

        <!-- RESULTS -->
        <div id="url-results" class="url-results-container hidden"></div>
        <div id="url-error" class="url-error-container hidden"></div>
    </div>
</div>

<script>
(function() {
    const CONFIG = {
        apiEndpoint: '/api/v1/scan/url',
        timeout: 20000
    };

    const elements = {
        input: document.getElementById('url-input'),
        btn: document.getElementById('url-analyze-btn'),
        results: document.getElementById('url-results'),
        error: document.getElementById('url-error')
    };

    // ============================================================
    // عرض النتائج - متوافق مع بنية البيانات من enhanced_complete
    // ============================================================
    function displayResults(data, url) {
        // استخراج البيانات من المسار الصحيح
        const analysis = data.analysis || {};

        // ✅ البيانات تأتي من analysis (الذي يحتوي على whois)
        const whoisData = analysis.whois || {};

        // ✅ استخراج بيانات WHOIS
        const domainAge = whoisData.age_years || analysis.domain_age_years;
        const domainRegistrar = whoisData.registrar || analysis.domain_registrar;
        const domainCountry = whoisData.country || analysis.domain_country;

        // ✅ استخراج بيانات SSL
        const sslData = analysis.ssl || {};
        const sslValid = sslData.valid || analysis.ssl_valid;
        const sslIssuer = sslData.issuer || analysis.ssl_issuer;
        const sslExpiry = sslData.expiry || analysis.ssl_expiry;
        const sslDays = sslData.days_remaining || analysis.ssl_days_remaining;

        // ✅ استخراج رؤوس الأمان
        const headersData = analysis.headers || {};
        const hasHsts = headersData.hsts || analysis.has_hsts;
        const hasXfo = headersData.xfo || analysis.has_xfo;
        const hasXcto = headersData.xcto || analysis.has_xcto;
        const hasCsp = headersData.csp || analysis.has_csp;

        const riskScore = data.risk_score || 0;
        const securityScore = 100 - riskScore;
        const host = analysis.host || url.replace(/^https?:\/\//, '').split('/')[0];

        // تحديد مستوى الخطر
        let riskLevel = 'آمن جداً', riskColor = '#10b981';
        if (riskScore >= 70) { riskLevel = 'مرتفع جداً'; riskColor = '#ef4444'; }
        else if (riskScore >= 50) { riskLevel = 'مرتفع'; riskColor = '#f97316'; }
        else if (riskScore >= 25) { riskLevel = 'متوسط'; riskColor = '#f59e0b'; }

        let html = `
            <div class="url-result-card" style="background: rgba(15,23,42,0.95); border-radius: 30px; padding: 35px;">
                <div class="url-result-header" style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                    <h3 style="color: #fcd34d; margin: 0;">نتيجة التحليل الأسطوري</h3>
                    <div style="color: ${riskColor}; font-weight: bold;">🛡️ ${riskLevel} (${securityScore}/100)</div>
                </div>

                <!-- مقياس الخطر -->
                <div style="background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; margin-bottom: 30px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>مستوى الأمان</span>
                        <span style="color: ${riskColor};">${securityScore}%</span>
                    </div>
                    <div style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;">
                        <div style="width: ${securityScore}%; height: 100%; background: ${riskColor}; border-radius: 10px;"></div>
                    </div>
                </div>

                <!-- المعلومات الأساسية -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div style="background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px;">
                        <div style="color: #fcd34d; font-size: 0.85rem;">🔗 الرابط</div>
                        <div style="font-family: monospace; word-break: break-all;">${url}</div>
                    </div>
                    <div style="background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px;">
                        <div style="color: #fcd34d; font-size: 0.85rem;">🌐 النطاق</div>
                        <div style="font-weight: bold;">${host}</div>
                    </div>
                    <div style="background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px;">
                        <div style="color: #fcd34d; font-size: 0.85rem;">🔒 HTTPS</div>
                        <div style="font-weight: bold; color: ${analysis.is_https ? '#10b981' : '#ef4444'};">${analysis.is_https ? '✓ متاح' : '✗ غير متاح'}</div>
                    </div>
                </div>

                <!-- معلومات WHOIS -->
                <div style="background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(245,158,11,0.1)); border-radius: 25px; padding: 25px; margin-bottom: 25px;">
                    <h4 style="color: #fcd34d; margin-top: 0;">📋 معلومات النطاق (WHOIS)</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">📅 عمر النطاق</div>
                            <div style="font-weight: bold; font-size: 1.1rem;">${domainAge ? domainAge + ' سنة' : 'غير معروف'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">🏳️ بلد الاستضافة</div>
                            <div style="font-weight: bold;">${domainCountry || 'غير معروف'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">📋 المسجل</div>
                            <div style="font-weight: bold;">${domainRegistrar || 'غير معروف'}</div>
                        </div>
                    </div>
                </div>

                <!-- شهادة SSL -->
                <div style="background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1)); border-radius: 25px; padding: 25px; margin-bottom: 25px;">
                    <h4 style="color: #fcd34d; margin-top: 0;">🔒 شهادة SSL/TLS</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">الحالة</div>
                            <div style="font-weight: bold; color: ${sslValid ? '#10b981' : '#ef4444'};">${sslValid ? '✓ صالحة' : '✗ غير صالحة'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">المُصدر</div>
                            <div style="font-weight: bold;">${sslIssuer || 'غير معروف'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">تنتهي في</div>
                            <div style="font-weight: bold;">${sslExpiry || 'غير معروف'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">الأيام المتبقية</div>
                            <div style="font-weight: bold; color: ${sslDays && sslDays < 30 ? '#f59e0b' : '#10b981'};">${sslDays || 0} يوم</div>
                        </div>
                    </div>
                </div>

                <!-- رؤوس الأمان -->
                <div style="background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.1)); border-radius: 25px; padding: 25px; margin-bottom: 25px;">
                    <h4 style="color: #fcd34d; margin-top: 0;">🛡️ رؤوس الأمان</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">HSTS</div>
                            <div style="color: ${hasHsts ? '#10b981' : '#ef4444'};">${hasHsts ? '✓ متاح' : '✗ غير متاح'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">X-Frame-Options</div>
                            <div style="color: ${hasXfo ? '#10b981' : '#f59e0b'};">${hasXfo ? '✓ متاح' : '✗ غير متاح'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">X-Content-Type</div>
                            <div style="color: ${hasXcto ? '#10b981' : '#f59e0b'};">${hasXcto ? '✓ متاح' : '✗ غير متاح'}</div>
                        </div>
                        <div>
                            <div style="color: #94a3b8; font-size: 0.8rem;">CSP</div>
                            <div style="color: ${hasCsp ? '#10b981' : '#f59e0b'};">${hasCsp ? '✓ متاح' : '✗ غير متاح'}</div>
                        </div>
                    </div>
                </div>

                <!-- الإشارات الأمنية -->
                ${analysis.signals && analysis.signals.length > 0 ? `
                <div style="background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; margin-bottom: 25px;">
                    <h4 style="color: #fcd34d; margin-top: 0;">🔍 الإشارات الأمنية</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        ${analysis.signals.map(s => `<span style="background: rgba(245,158,11,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;">🔹 ${s}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                <!-- توصيات -->
                <div style="background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px;">
                    <h4 style="color: #fcd34d; margin-top: 0;">💡 توصيات ذكية</h4>
                    ${!analysis.is_https ? '<div>🔓 الرابط غير آمن (بدون HTTPS). لا ترسل بيانات حساسة.</div>' : ''}
                    ${domainAge && domainAge < 1 ? '<div>🌐 النطاق جديد (أقل من سنة). كن حذراً.</div>' : ''}
                    ${!sslValid ? '<div>⚠️ شهادة SSL غير صالحة. لا تشارك معلومات حساسة.</div>' : ''}
                    <div>✅ الرابط يبدو آمناً بشكل عام. يمكن فتحه مع الحذر الطبيعي.</div>
                </div>
            </div>
        `;

        elements.results.innerHTML = html;
        elements.results.classList.remove('hidden');
        elements.error.classList.add('hidden');
    }

    function showError(message) {
        elements.error.innerHTML = `<div style="padding: 40px; text-align: center;">❌ ${message}</div>`;
        elements.error.classList.remove('hidden');
        elements.results.classList.add('hidden');
    }

    function setLoading(isLoading) {
        elements.btn.disabled = isLoading;
        elements.btn.textContent = isLoading ? '🔥 جاري الفحص...' : '🔍 فحص أسطوري';
    }

    async function analyze() {
        let url = elements.input.value.trim();
        if (!url) { showError('الرجاء إدخال رابط'); return; }

        // أضف https:// إذا لم يكن موجوداً
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        setLoading(true);
        elements.results.classList.add('hidden');
        elements.error.classList.add('hidden');

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.timeout);

            const response = await fetch(CONFIG.apiEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (!response.ok) {
                throw new Error('فشل التحليل');
            }

            const data = await response.json();
            displayResults(data, url);

        } catch (error) {
            if (error.name === 'AbortError') {
                showError('⏰ انتهت مهلة الاتصال');
            } else {
                showError(error.message || '❌ حدث خطأ في الاتصال');
            }
        } finally {
            setLoading(false);
        }
    }

    elements.btn.addEventListener('click', analyze);
    elements.input.addEventListener('keypress', e => { if (e.key === 'Enter') analyze(); });

    console.log('🔥 URL Check Tool Loaded');
})();
</script>

<style>
.url-tool-card { background: rgba(15,23,42,0.85); backdrop-filter: blur(25px); border: 1px solid rgba(245,158,11,0.35); border-radius: 50px; padding: 40px; }
.url-title-large { font-size: 2rem; color: #fcd34d; margin: 0; text-align: center; }
.url-input-area { display: flex; gap: 20px; margin: 30px 0; flex-wrap: wrap; justify-content: center; }
.url-input-wrapper { flex: 1; min-width: 300px; }
.url-input-field { width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.5); border: 1px solid #f59e0b; border-radius: 50px; color: #fff; font-size: 1rem; }
.url-analyze-btn { padding: 15px 40px; background: linear-gradient(135deg, #f59e0b, #f97316); border: none; border-radius: 50px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
.url-analyze-btn:hover { transform: translateY(-2px); }
.url-results-container { margin-top: 30px; }
.hidden { display: none; }
.url-error-container { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; border-radius: 30px; padding: 40px; text-align: center; }
</style>

{% endblock %}
